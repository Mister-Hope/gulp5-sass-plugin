name: Build and Linter Test

on:
  push:
  pull_request:

permissions:
  contents: read
  id-token: write

jobs:
  build-and-linter:
    name: Build and Linter test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - name: Install Deps
        run: pnpm ci

      - name: Build project
        env:
          BUNDLE_ANALYSIS: true
        run: pnpm run build

      - name: Linter test
        run: |
          pnpm run lint:check
